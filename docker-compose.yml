services:
  db:
    image: postgres:16-alpine
    container_name: moduwa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: moduwa
      POSTGRES_PASSWORD: moduwa
      POSTGRES_DB: moduwa
      TZ: Asia/Seoul
    ports:
      - "5432:5432"
    volumes:
      - moduwa_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moduwa -d moduwa"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  moduwa_pgdata:
